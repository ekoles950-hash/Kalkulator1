<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Basecamp Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .receipt-font { font-family: 'Courier New', Courier, monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tap-effect:active { transform: scale(0.95); transition: transform 0.1s; }
        
        /* Input styling */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">

    <!-- Header -->
    <header class="bg-amber-900 text-white p-2 px-4 shadow-md flex justify-between items-center z-10">
        <div>
            <h1 class="text-lg font-bold">Basecamp Coffee</h1>
            <p class="text-[10px] text-amber-200">Grogol - Pejawaran</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] opacity-80">No Pesanan</p>
            <p class="font-mono font-bold text-base" id="orderNo">#---</p>
        </div>
    </header>

    <!-- Area Utama -->
    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Kolom Kiri: Keranjang & Pembayaran -->
        <div class="flex-[0.8] flex flex-col bg-white border-r border-gray-200 lg:max-w-sm relative z-0">
            <!-- Header Struk -->
            <div class="p-1.5 bg-gray-50 border-b border-gray-200 text-center receipt-font text-[10px] text-gray-500 font-bold tracking-wider">
                KERANJANG PESANAN
            </div>

            <!-- List Item -->
            <div class="flex-1 overflow-y-auto p-2 space-y-1.5" id="cartList">
                <!-- Item masuk ke sini -->
            </div>

            <!-- Panel Pembayaran -->
            <div class="p-3 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-10">
                <!-- Total -->
                <div class="flex justify-between items-end mb-2 border-b border-dashed border-gray-300 pb-2">
                    <span class="text-gray-600 text-xs font-semibold">Total Tagihan</span>
                    <span class="text-2xl font-extrabold text-amber-900" id="totalDisplay">Rp 0</span>
                </div>

                <!-- Fitur Uang Bayar -->
                <div class="mb-2">
                    <div class="text-[10px] font-bold text-gray-500 mb-1">UANG DITERIMA:</div>
                    <div class="flex gap-1 mb-1.5">
                        <button onclick="setBayar('pas')" class="flex-1 bg-gray-100 border border-gray-300 text-gray-700 py-1.5 rounded text-[10px] font-bold tap-effect hover:bg-gray-200">Pas</button>
                        <button onclick="setBayar(10000)" class="flex-1 bg-purple-50 border border-purple-200 text-purple-700 py-1.5 rounded text-[10px] font-bold tap-effect hover:bg-purple-100">10k</button>
                        <button onclick="setBayar(20000)" class="flex-1 bg-green-50 border border-green-200 text-green-700 py-1.5 rounded text-[10px] font-bold tap-effect hover:bg-green-100">20k</button>
                        <button onclick="setBayar(50000)" class="flex-1 bg-blue-50 border border-blue-200 text-blue-700 py-1.5 rounded text-[10px] font-bold tap-effect hover:bg-blue-100">50k</button>
                        <button onclick="setBayar(100000)" class="flex-1 bg-red-50 border border-red-200 text-red-700 py-1.5 rounded text-[10px] font-bold tap-effect hover:bg-red-100">100k</button>
                    </div>
                    
                    <div class="flex justify-between items-center bg-gray-50 px-2 py-1.5 rounded border border-gray-100">
                        <span class="text-[10px] text-gray-500">Kembali:</span>
                        <span class="font-bold text-sm text-gray-400" id="kembalianDisplay">-</span>
                    </div>
                </div>

                <!-- Tombol Aksi -->
                <div class="grid grid-cols-4 gap-2 mt-2">
                    <button onclick="resetCart()" class="col-span-1 tap-effect bg-red-100 text-red-700 py-2 rounded-lg font-bold text-xs border border-red-200 hover:bg-red-200">
                        Reset
                    </button>
                    <button onclick="printRawBT()" class="col-span-3 tap-effect bg-green-600 text-white py-2 rounded-lg font-bold text-sm shadow-md hover:bg-green-700 flex justify-center items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                        </svg>
                        CETAK STRUK
                    </button>
                </div>
            </div>
        </div>

        <!-- Kolom Kanan: Daftar Menu -->
        <div class="flex-[1.2] bg-gray-100 flex flex-col overflow-hidden">
            <div class="p-1.5 bg-gray-200 text-[10px] font-bold text-gray-500 uppercase tracking-wide text-center">Menu Warung</div>
            <div class="flex-1 overflow-y-auto p-2 no-scrollbar">
                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2 pb-10" id="menuGrid">
                    <!-- Menu Buttons -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer: Laporan Keuangan Manual ke Telegram (DIPERBAIKI) -->
    <div class="bg-slate-800 p-2.5 pb-4 shadow-[0_-4px_10px_rgba(0,0,0,0.2)] z-20 flex flex-col gap-1.5 w-full">
        
        <!-- Teks Permintaan -->
        <div class="text-amber-300 text-xs font-bold tracking-wide ml-1">
            Pemasukan hari ini mas hedri!
        </div>
        
        <!-- Input & Tombol Bersebelahan -->
        <div class="flex gap-2 w-full items-center">
            
            <div class="flex-1 flex items-center bg-slate-700 rounded-lg overflow-hidden border border-slate-600 focus-within:border-blue-400 focus-within:ring-1 focus-within:ring-blue-400 transition-all">
                <span class="pl-3 pr-2 text-slate-400 font-bold">Rp</span>
                <input 
                    type="number" 
                    id="inputPemasukan" 
                    placeholder="Nominal..." 
                    class="w-full bg-transparent text-white py-2.5 pr-2 outline-none font-bold text-sm"
                >
            </div>

            <button onclick="kirimTelegramManual()" id="btnKirimTelegram" class="tap-effect bg-blue-500 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-md hover:bg-blue-600 flex items-center justify-center gap-1.5 transition-colors whitespace-nowrap">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
                Kirim
            </button>

        </div>
    </div>

    <script>
        // --- KONFIGURASI MENU (Diupdate sesuai screenshot) ---
        const menuItems = [
            { name: "Kopi", price: 4000, color: "bg-amber-800 text-white" },
            { name: "Tron", price: 1000, color: "bg-blue-600 text-white" },
            { name: "Rokok Moca", price: 2000, color: "bg-gray-700 text-white" },
            { name: "Surya Filter", price: 2000, color: "bg-red-700 text-white" },
            { name: "Auka", price: 2500, color: "bg-teal-600 text-white" },
            { name: "Klotak", price: 500, color: "bg-orange-600 text-white" },
            { name: "Opak", price: 1000, color: "bg-yellow-600 text-white" },
            { name: "Mie", price: 6000, color: "bg-yellow-400 text-black border border-yellow-500" },
            { name: "Ps", price: 5000, color: "bg-indigo-600 text-white" },
            { name: "Rokok Ilegal", price: 1000, color: "bg-stone-800 text-white" },
            { name: "Item 10k", price: 10000, color: "bg-white text-gray-800 border-gray-300" }, 
            { name: "mie telor", price: 7500, color: "bg-white text-gray-800 border-gray-300" }  
        ];

        // --- KONFIGURASI TELEGRAM ---
        const TELEGRAM_TOKEN = "7204976900:AAE0KLQCJrYrHqH0jA5X1diELGan7TYQ0cc";
        const TELEGRAM_CHAT_ID = "7933777456";

        let cart = {};
        let orderNumber = localStorage.getItem('lastOrderNo') ? parseInt(localStorage.getItem('lastOrderNo')) + 1 : 1001;
        let totalBelanja = 0;
        let uangBayar = 0;

        document.addEventListener('DOMContentLoaded', () => {
            renderMenu();
            updateOrderNoDisplay();
            renderCart();
        });

        function updateOrderNoDisplay() {
            document.getElementById('orderNo').innerText = `#${orderNumber}`;
        }

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';

            menuItems.forEach(item => {
                const btn = document.createElement('button');
                const colorClass = item.color || 'bg-white text-gray-800 border-gray-300';
                
                btn.className = `${colorClass} tap-effect relative p-1.5 rounded-lg shadow-sm hover:shadow flex flex-col items-center justify-center h-20 w-full transition-all border border-transparent hover:brightness-110`;
                btn.onclick = () => addToCart(item);
                btn.innerHTML = `
                    <span class="font-bold text-xs leading-tight text-center mb-1">${item.name}</span>
                    <span class="text-[10px] font-mono opacity-90 bg-black/20 px-1.5 py-0.5 rounded">Rp ${item.price.toLocaleString('id-ID')}</span>
                `;
                grid.appendChild(btn);
            });
        }

        function addToCart(item) {
            if (cart[item.name]) {
                cart[item.name].qty++;
                cart[item.name].subtotal = cart[item.name].qty * item.price;
            } else {
                cart[item.name] = { price: item.price, qty: 1, subtotal: item.price };
            }
            uangBayar = 0; 
            renderCart();
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function removeFromCart(itemName) {
            if (cart[itemName]) {
                cart[itemName].qty--;
                if (cart[itemName].qty <= 0) {
                    delete cart[itemName];
                } else {
                    cart[itemName].subtotal = cart[itemName].qty * cart[itemName].price;
                }
                uangBayar = 0;
                renderCart();
                if (navigator.vibrate) navigator.vibrate(30);
            }
        }

        function setBayar(nominal) {
            if (totalBelanja === 0) return;
            
            if (nominal === 'pas') {
                uangBayar = totalBelanja;
            } else {
                uangBayar = nominal;
            }
            updateKembalian();
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function updateKembalian() {
            const kembalianEl = document.getElementById('kembalianDisplay');
            
            if (uangBayar === 0) {
                kembalianEl.innerText = "-";
                kembalianEl.className = "font-bold text-sm text-gray-400";
            } else {
                let kembali = uangBayar - totalBelanja;
                if (kembali < 0) {
                    kembalianEl.innerText = "Kurang Rp " + Math.abs(kembali).toLocaleString('id-ID');
                    kembalianEl.className = "font-bold text-sm text-red-600";
                } else {
                    kembalianEl.innerText = "Rp " + kembali.toLocaleString('id-ID');
                    kembalianEl.className = "font-bold text-sm text-green-600";
                }
            }
        }

        function renderCart() {
            const list = document.getElementById('cartList');
            const totalEl = document.getElementById('totalDisplay');
            
            list.innerHTML = '';
            totalBelanja = 0;
            const items = Object.entries(cart);

            if (items.length === 0) {
                list.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 opacity-50 pt-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <p class="text-xs">Belum ada pesanan</p>
                    </div>`;
                totalEl.innerText = "Rp 0";
                updateKembalian();
                return;
            }

            items.forEach(([name, data]) => {
                totalBelanja += data.subtotal;
                
                const row = document.createElement('div');
                row.className = "flex justify-between items-center bg-white p-2 rounded-md border border-gray-100 shadow-sm animate-fade-in";
                row.innerHTML = `
                    <div class="flex-1">
                        <div class="font-bold text-gray-800 text-sm">${name}</div>
                        <div class="text-[10px] text-gray-500 font-mono">${data.qty} x ${data.price.toLocaleString('id-ID')}</div>
                    </div>
                    <div class="text-right flex flex-row items-center gap-2">
                        <div class="font-bold text-amber-700 text-sm">Rp ${data.subtotal.toLocaleString('id-ID')}</div>
                        <button onclick="removeFromCart('${name}')" class="bg-red-50 text-red-500 border border-red-200 w-6 h-6 rounded flex items-center justify-center text-lg font-bold hover:bg-red-100 active:scale-95 transition-transform">-</button>
                    </div>
                `;
                list.appendChild(row);
            });

            totalEl.innerText = "Rp " + totalBelanja.toLocaleString('id-ID');
            updateKembalian();
        }

        function resetCart() {
            if (Object.keys(cart).length > 0 && confirm("Hapus semua pesanan?")) {
                cart = {};
                uangBayar = 0;
                renderCart();
            }
        }

        // --- LOGIKA RAWBT ---
        function printRawBT() {
            if (Object.keys(cart).length === 0) {
                alert("Keranjang masih kosong!");
                return;
            }

            if (uangBayar > 0 && uangBayar < totalBelanja) {
                if(!confirm("Uang bayar kurang! Tetap cetak?")) return;
            }

            let text = "";

            text += "[C]<b>Basecamp coffee</b>\n";
            text += "[C]Grogol\n";
            text += "[C]Pejawaran\n";
            text += "[L]\n";
            text += "[L]No pesanan: " + orderNumber + "\n";
            text += "[L]Tanggal: " + new Date().toLocaleDateString('id-ID') + " " + new Date().toLocaleTimeString('id-ID').substring(0,5) + "\n";
            text += "[C]--------------------------------\n";

            for (let name in cart) {
                let item = cart[name];
                text += "[L]" + name + "\n";
                let qtyPrice = item.qty + " x " + item.price.toLocaleString('id-ID');
                let subVal = item.subtotal.toLocaleString('id-ID');
                text += "[L]" + qtyPrice + "[R]" + subVal + "\n";
            }

            text += "[C]--------------------------------\n";
            text += "[R]<b>TOTAL   : Rp " + totalBelanja.toLocaleString('id-ID') + "</b>\n";
            
            if (uangBayar > 0) {
                text += "[R]TUNAI   : Rp " + uangBayar.toLocaleString('id-ID') + "\n";
                let kembali = uangBayar - totalBelanja;
                text += "[R]KEMBALI : Rp " + (kembali > 0 ? kembali : 0).toLocaleString('id-ID') + "\n";
            }

            text += "[C]--------------------------------\n";
            text += "[C]Terima Kasih\n";
            text += "\n\n"; 

            const base64Str = btoa(text);
            const rawbtUrl = "rawbt:base64," + base64Str;

            saveNextOrderNumber();
            window.location.href = rawbtUrl;
        }

        function saveNextOrderNumber() {
            orderNumber++;
            localStorage.setItem('lastOrderNo', orderNumber);
            updateOrderNoDisplay();
        }

        // --- LOGIKA TELEGRAM ---
        async function kirimTelegramManual() {
            const inputEl = document.getElementById('inputPemasukan');
            const nominalValue = inputEl.value;
            const btn = document.getElementById('btnKirimTelegram');

            if (!nominalValue || isNaN(nominalValue) || parseInt(nominalValue) <= 0) {
                alert("Silakan masukkan nominal pemasukan yang valid!");
                inputEl.focus();
                return;
            }

            const nominal = parseInt(nominalValue);
            
            if(!confirm(`Kirim laporan pemasukan sebesar Rp ${nominal.toLocaleString('id-ID')} ke Telegram?`)){
                return;
            }

            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            btn.disabled = true;
            btn.classList.add("opacity-70", "cursor-not-allowed");

            const waktu = new Date().toLocaleString('id-ID', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            const pesan = `
📊 *LAPORAN PEMASUKAN MANUAL*
🏠 *Basecamp Coffee*

💰 *Nominal:* Rp ${nominal.toLocaleString('id-ID')}
🕒 *Waktu:* ${waktu}

_Laporan dikirim oleh mas hedri!_`;

            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: pesan,
                        parse_mode: 'Markdown'
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    alert("✅ Laporan berhasil dikirim ke Telegram!");
                    inputEl.value = ""; 
                } else {
                    alert("❌ Gagal mengirim laporan: " + data.description);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("❌ Terjadi kesalahan koneksi saat mengirim laporan.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove("opacity-70", "cursor-not-allowed");
            }
        }

    </script>
</body>
</html>
