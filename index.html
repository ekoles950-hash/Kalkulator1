<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Warung Jumbo - Basecamp Coffee</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Menghilangkan panah di input number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

        .jumbo-shadow {
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const ITEM_DATA = [
            { id: 1, name: 'Kopi', price: 4000, color: 'bg-amber-100 border-amber-500 text-amber-900' },
            { id: 2, name: 'Tron', price: 1000, color: 'bg-blue-100 border-blue-500 text-blue-900' },
            { id: 3, name: 'Rokok Moca', price: 2000, color: 'bg-zinc-200 border-zinc-500 text-zinc-900' },
            { id: 4, name: 'Gajah Baru', price: 2000, color: 'bg-red-100 border-red-500 text-red-900' },
            { id: 5, name: 'Auka', price: 2500, color: 'bg-cyan-100 border-cyan-500 text-cyan-900' },
            { id: 6, name: 'Klotak', price: 500, color: 'bg-orange-100 border-orange-500 text-orange-900' },
            { id: 7, name: 'Opak', price: 1000, color: 'bg-yellow-100 border-yellow-500 text-yellow-900' },
            { id: 8, name: 'Mie', price: 6000, color: 'bg-rose-100 border-rose-500 text-rose-900' },
            { id: 11, name: 'Mie Telor', price: 7500, color: 'bg-emerald-100 border-emerald-500 text-emerald-900' },
            { id: 9, name: 'Ps', price: 5000, color: 'bg-purple-100 border-purple-500 text-purple-900' },
            { id: 10, name: 'Kopi Mentah', price: 2500, color: 'bg-stone-300 border-stone-600 text-stone-900' },
        ];

        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
            }).format(number);
        };

        function App() {
            const [cart, setCart] = useState([]);
            const [payment, setPayment] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [orderId, setOrderId] = useState(Math.floor(1000 + Math.random() * 9000));
            const [showPsModal, setShowPsModal] = useState(false);

            useEffect(() => {
                lucide.createIcons();
            });

            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const change = payment ? parseInt(payment) - total : 0;

            const addToCart = (item, quantity = 1) => {
                setCart(prev => {
                    const existing = prev.find(i => i.id === item.id);
                    if (existing) {
                        return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + quantity } : i);
                    }
                    return [...prev, { ...item, qty: quantity }];
                });
            };

            const handleItemClick = (item) => {
                if (item.name === 'Ps') {
                    setShowPsModal(true);
                } else {
                    addToCart(item);
                }
            };

            const addPsDuration = (hours) => {
                const psItem = ITEM_DATA.find(i => i.name === 'Ps');
                addToCart(psItem, hours);
                setShowPsModal(false);
            };

            const updateQty = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQty = item.qty + delta;
                        return newQty > 0 ? { ...item, qty: newQty } : item;
                    }
                    return item;
                }));
            };

            const generateReceiptText = () => {
                const tgl = new Date().toLocaleString('id-ID');
                let text = `BASECAMP COFFEE\nGrogol, Pejawaran\n${tgl}\nNo: #${orderId}\n--------------------------------\n`;
                cart.forEach(item => {
                    text += `${item.name}\n${item.qty} x @ ${formatRupiah(item.price)} = ${formatRupiah(item.qty * item.price)}\n`;
                });
                text += `--------------------------------\nTOTAL   : ${formatRupiah(total)}\nTUNAI   : ${formatRupiah(payment || 0)}\nKEMBALI : ${formatRupiah(change)}\n--------------------------------\nTerima Kasih!`;
                return text;
            };

            const handleCopy = () => {
                const text = generateReceiptText();
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Struk berhasil disalin!");
            };

            const printUrl = useMemo(() => {
                if (cart.length === 0) return '#';
                const text = generateReceiptText();
                const base64Data = btoa(unescape(encodeURIComponent(text)));
                return `intent:base64,${base64Data}#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.editor=text;end;`;
            }, [cart, payment]);

            const filteredItems = ITEM_DATA.filter(item => 
                item.name.toLowerCase().includes(searchQuery.toLowerCase())
            );

            return (
                <div className="min-h-screen flex flex-col md:flex-row h-screen overflow-hidden bg-zinc-200">
                    
                    {/* MODAL PS JUMBO */}
                    {showPsModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-md">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-xl overflow-hidden">
                                <div className="bg-purple-700 p-8 flex justify-between items-center text-white">
                                    <h3 className="font-black text-3xl flex items-center gap-4"><i data-lucide="clock" className="w-10 h-10"></i> DURASI PS</h3>
                                    <button onClick={() => setShowPsModal(false)} className="bg-white/20 p-2 rounded-full"><i data-lucide="x" className="w-8 h-8"></i></button>
                                </div>
                                <div className="p-8 grid grid-cols-2 gap-6 max-h-[70vh] overflow-y-auto">
                                    {[1, 2, 3, 4, 5, 6, 7, 8].map(h => (
                                        <button key={h} onClick={() => addPsDuration(h)} className="p-8 border-4 border-purple-100 rounded-[2rem] hover:bg-purple-50 hover:border-purple-500 transition-all active:scale-95 group">
                                            <div className="font-black text-5xl text-purple-900 group-hover:scale-110 transition-transform">{h} JAM</div>
                                            <div className="text-2xl font-bold text-purple-600 mt-2">{formatRupiah(h * 5000)}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* AREA MENU (KIRI) */}
                    <div className="flex-1 p-6 md:p-10 overflow-y-auto pb-[80vh] md:pb-10">
                        <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-10 gap-6">
                            <div>
                                <h1 className="text-6xl font-[900] tracking-tighter text-gray-900 flex items-center gap-4">
                                    <i data-lucide="calculator" className="text-blue-600 w-16 h-16"></i> BASECAMP
                                </h1>
                                <p className="text-2xl text-gray-500 font-black mt-1">ID ORDER: #{orderId}</p>
                            </div>
                            <div className="relative w-full xl:w-[400px]">
                                <i data-lucide="search" className="absolute left-6 top-1/2 -translate-y-1/2 w-8 h-8 text-gray-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="CARI MENU..." 
                                    className="w-full pl-16 pr-8 py-6 border-4 border-white bg-white rounded-3xl text-3xl font-black shadow-xl focus:border-blue-500 outline-none transition-all"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-6">
                            {filteredItems.map(item => (
                                <button 
                                    key={item.id} 
                                    onClick={() => handleItemClick(item)}
                                    className={`${item.color} p-8 rounded-[2.5rem] border-b-[12px] shadow-xl text-left h-52 flex flex-col justify-between active:translate-y-2 active:border-b-4 transition-all hover:scale-[1.02]`}
                                >
                                    <span className="font-black text-3xl leading-tight uppercase tracking-tighter">{item.name}</span>
                                    <span className="font-black text-4xl tracking-tighter">{formatRupiah(item.price).replace(",00", "")}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* AREA KASIR (KANAN) - JUMBO PANEL */}
                    <div className="w-full md:w-[550px] bg-white border-t-8 md:border-l-8 border-blue-600 shadow-2xl flex flex-col h-[75vh] md:h-full fixed bottom-0 md:relative z-20">
                        <div className="p-6 border-b-4 border-gray-100 flex justify-between bg-gray-50 items-center">
                            <span className="font-black text-3xl flex items-center gap-4"><i data-lucide="shopping-cart" className="w-8 h-8"></i> KERANJANG</span>
                            <button onClick={() => {if(confirm('HAPUS SEMUA PESANAN?')) setCart([])}} className="bg-red-600 text-white px-6 py-3 rounded-2xl font-black text-xl active:bg-red-800">RESET</button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-zinc-50">
                            {cart.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-gray-300">
                                    <i data-lucide="shopping-bag" className="w-32 h-32 mb-4 opacity-20"></i>
                                    <p className="font-black text-2xl uppercase">Kosong</p>
                                </div>
                            ) : (
                                cart.map(item => (
                                    <div key={item.id} className="flex justify-between items-center bg-white p-6 rounded-[2rem] border-4 border-gray-100 shadow-sm">
                                        <div className="flex-1">
                                            <div className="font-black text-3xl text-gray-800 uppercase tracking-tighter">{item.name}</div>
                                            <div className="text-xl font-bold text-gray-500">{formatRupiah(item.price)}</div>
                                        </div>
                                        <div className="flex items-center gap-6 bg-gray-100 border-4 border-gray-200 rounded-3xl px-4 py-2">
                                            <button onClick={() => updateQty(item.id, -1)} className="font-black text-5xl text-red-600 w-12 active:scale-125 transition-transform">-</button>
                                            <span className="font-black text-4xl w-12 text-center text-blue-700">{item.qty}</span>
                                            <button onClick={() => updateQty(item.id, 1)} className="font-black text-5xl text-green-600 w-12 active:scale-125 transition-transform">+</button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        {/* PANEL PEMBAYARAN RAKSASA */}
                        <div className="p-8 bg-white space-y-6 border-t-8 border-gray-100 jumbo-shadow">
                            <div className="flex justify-between items-center">
                                <span className="font-black text-gray-400 text-2xl uppercase">Total Bayar:</span>
                                <span className="font-[1000] text-7xl text-blue-700 tracking-tighter">{formatRupiah(total)}</span>
                            </div>

                            <div className="space-y-4">
                                <div className="flex gap-3 overflow-x-auto pb-4 no-scrollbar">
                                    <button onClick={() => setPayment(total)} className="px-8 py-5 bg-blue-700 text-white rounded-2xl font-black text-3xl whitespace-nowrap active:bg-blue-900 shadow-lg">UANG PAS</button>
                                    {[5000, 10000, 20000, 50000, 100000].map(amt => (
                                        <button key={amt} onClick={() => setPayment(amt)} className="px-8 py-5 bg-green-600 text-white rounded-2xl font-black text-3xl whitespace-nowrap active:bg-green-800 shadow-lg">
                                            {amt/1000}K
                                        </button>
                                    ))}
                                </div>
                                <div className="relative">
                                    <span className="absolute left-8 top-1/2 -translate-y-1/2 font-black text-4xl text-gray-300">Rp</span>
                                    <input 
                                        type="number" 
                                        placeholder="INPUT TUNAI..." 
                                        className="w-full pl-24 pr-8 py-8 border-8 border-gray-100 bg-gray-50 rounded-[2.5rem] text-6xl font-black text-gray-900 focus:border-blue-600 outline-none transition-all placeholder:text-gray-200"
                                        value={payment}
                                        onChange={(e) => setPayment(e.target.value)}
                                    />
                                </div>
                            </div>

                            <div className={`flex justify-between items-center p-6 rounded-[2rem] ${change < 0 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'} border-4 ${change < 0 ? 'border-red-200' : 'border-green-200'}`}>
                                <span className="font-black text-2xl uppercase">Kembali:</span>
                                <span className="font-black text-5xl tracking-tighter">
                                    {formatRupiah(change)}
                                </span>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <a href={printUrl} className={`col-span-2 ${cart.length > 0 ? 'bg-green-600' : 'bg-gray-300'} text-white py-8 rounded-[2rem] font-black text-4xl flex items-center justify-center gap-6 shadow-2xl active:scale-95 transition-all text-center decoration-transparent`}>
                                    <i data-lucide="zap" className="w-12 h-12"></i> CETAK STRUK
                                </a>
                                <button onClick={handleCopy} disabled={cart.length === 0} className="bg-zinc-800 text-white py-6 rounded-[2rem] font-black text-2xl flex items-center justify-center gap-4 active:bg-black disabled:opacity-30">
                                    <i data-lucide="copy" className="w-8 h-8"></i> SALIN
                                </button>
                                <button onClick={() => {if(confirm('MULAI TRANSAKSI BARU?')){setCart([]); setPayment(''); setOrderId(Math.floor(1000 + Math.random() * 9000))}}} className="bg-blue-600 text-white py-6 rounded-[2rem] font-black text-2xl flex items-center justify-center gap-4 active:bg-blue-800">
                                    <i data-lucide="refresh-ccw" className="w-8 h-8"></i> BARU
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
